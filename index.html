<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Post Office</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-wrapper">
        <nav class="side-nav">
            <div class="logo"><i class="fa-solid fa-envelopes-bulk"></i> PO</div>
            <ul>
                <li class="active"><i class="fa-solid fa-house"></i> Home</li>
                <li><i class="fa-solid fa-hashtag"></i> Explore</li>
                <li><i class="fa-solid fa-bell"></i> Notifications</li>
                <li><i class="fa-solid fa-user"></i> Profile</li>
            </ul>
            <button class="post-btn">Post Envelope</button>
        </nav>

        <main class="feed">
            <div class="feed-header">
                <h3>The Sorting Room</h3>
            </div>
            
            <div class="create-post">
                <img src="https://via.placeholder.com/50" alt="avatar" class="avatar">
                <textarea placeholder="What's in the mail today?"></textarea>
                <div class="actions">
                    <button id="submit-post">Stamp & Send</button>
                </div>
            </div>

            <div id="timeline"></div>
        </main>

        <aside class="trending">
            <div class="search-bar">
                <input type="text" placeholder="Track a package...">
            </div>
            <div class="trending-card">
                <h4>Registered Mail (Trending)</h4>
                <div class="trend-item">#TermuxHacks</div>
                <div class="trend-item">#HydraBruteForce</div>
                <div class="trend-item">#LenovoPower</div>
            </div>
        </aside>
    </div>
    <script src="script.js"></script>
</body>
</html>
